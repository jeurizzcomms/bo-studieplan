<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bo's Studieplan 🌟</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --green:#58CC02; --green-dk:#46A302;
  --blue:#1CB0F6;  --blue-dk:#0099D9;
  --orange:#FF9600; --orange-dk:#CC7A00;
  --red:#FF4B4B;   --purple:#A560E8;
  --yellow:#FFC800; --teal:#00C9A7;
  --gray:#AFAFAF;  --gray-lt:#F7F7F7;
  --text:#3C3C3C;
}
body { font-family:'Segoe UI',-apple-system,sans-serif; background:linear-gradient(160deg,#667eea,#764ba2); min-height:100vh; padding:12px 12px 40px; color:var(--text); }

/* HEADER */
.hdr { text-align:center; color:#fff; padding:18px 0 12px; }
.hdr h1 { font-size:1.9rem; font-weight:900; text-shadow:0 2px 8px rgba(0,0,0,.3); }
.hdr p  { font-size:.85rem; opacity:.8; margin-top:3px; }

/* PROGRESS */
.prog-wrap { background:rgba(255,255,255,.22); border-radius:10px; height:11px; max-width:360px; margin:0 auto 5px; overflow:hidden; }
.prog-fill  { height:100%; background:var(--yellow); border-radius:10px; transition:width .5s; }
.prog-lbl   { text-align:center; font-size:.78rem; color:rgba(255,255,255,.8); margin-bottom:12px; }

/* STARS BAR */
.stars-bar { background:rgba(255,255,255,.18); border-radius:20px; padding:9px 18px; display:flex; align-items:center; justify-content:center; gap:8px; color:#fff; font-weight:700; font-size:1rem; max-width:320px; margin:0 auto 14px; }

/* MOTIVATION */
.motiv { background:rgba(255,255,255,.14); border-radius:14px; padding:10px 14px; color:#fff; text-align:center; font-size:.88rem; font-weight:600; max-width:380px; margin:0 auto 14px; line-height:1.4; }

/* TRACK */
.track { max-width:420px; margin:0 auto; }
.connector { width:4px; height:18px; background:rgba(255,255,255,.35); border-radius:2px; margin:0 auto; }

/* DAY NODE */
.day { width:100%; background:#fff; border-radius:20px; padding:14px 16px; box-shadow:0 4px 18px rgba(0,0,0,.15); cursor:pointer; border:3px solid transparent; transition:transform .12s; }
.day:active { transform:scale(.98); }
.day.today  { border-color:var(--yellow); box-shadow:0 4px 22px rgba(255,200,0,.35); }
.day.done   { border-color:var(--green); background:#F2FCE8; }
.day.exam   { border-color:var(--red); }
.day.locked { opacity:.5; cursor:default; }

.day-hdr { display:flex; align-items:center; gap:11px; }
.day-icon { width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; box-shadow:0 3px 8px rgba(0,0,0,.15); }
.day-info { flex:1; min-width:0; }
.day-name { font-weight:800; font-size:.95rem; }
.day-date { font-size:.75rem; color:var(--gray); margin-top:1px; }
.day-sub  { font-size:.82rem; color:#666; font-weight:600; margin-top:2px; }
.day-prog { font-size:.75rem; color:#999; margin-top:2px; }

.badge { font-size:.65rem; font-weight:700; padding:3px 8px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.b-today  { background:var(--yellow); color:#333; }
.b-done   { background:var(--green);  color:#fff; }
.b-exam   { background:var(--red);    color:#fff; }
.b-free   { background:var(--blue);   color:#fff; }
.b-toets  { background:var(--purple); color:#fff; }
.b-morgen { background:var(--orange); color:#fff; }

/* EXPANDED */
.day-body { display:none; margin-top:12px; border-top:2px solid #f0f0f0; padding-top:12px; }
.day-body.open { display:block; }

/* SUBJECT BLOCK */
.subject-block { background:var(--gray-lt); border-radius:14px; padding:12px 14px; margin-bottom:10px; }
.subject-block:last-child { margin-bottom:0; }
.subject-title { font-weight:800; font-size:.92rem; display:flex; align-items:center; gap:7px; margin-bottom:8px; }
.subject-tag { font-size:.65rem; padding:2px 8px; border-radius:20px; color:#fff; font-weight:700; }
.tag-bio { background:#1CB0F6; } .tag-na { background:#FF9600; } .tag-ak { background:#58CC02; }
.tag-ne { background:#A560E8; } .tag-wi { background:#FF4B4B; } .tag-fa { background:#00C9A7; }
.tag-ge { background:#FFC800; color:#333; } .tag-du { background:#667eea; }

.task-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
.task { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; background:#fff; border-radius:12px; cursor:pointer; border:2px solid transparent; transition:background .12s; }
.task:active { transform:scale(.98); }
.task.done  { background:#EEFFDC; border-color:var(--green); }
.task.done .task-lbl { text-decoration:line-through; color:var(--gray); }
.chk { width:26px; height:26px; border-radius:50%; border:3px solid var(--gray); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:.9rem; transition:all .2s; margin-top:1px; }
.task.done .chk { background:var(--green); border-color:var(--green); color:#fff; }
.task-lbl  { font-size:.88rem; font-weight:600; line-height:1.3; }
.task-sub  { font-size:.76rem; color:#888; margin-top:2px; font-weight:400; }

/* TOETSSTOF BOX */
.stof-box { background:#EEF6FF; border-left:4px solid var(--blue); border-radius:0 10px 10px 0; padding:10px 12px; margin-bottom:8px; font-size:.8rem; line-height:1.6; }
.stof-box strong { display:block; margin-bottom:4px; color:var(--blue-dk); font-size:.82rem; }
.stof-box ul { padding-left:16px; }
.stof-box li { margin-bottom:2px; }
.tip-box { background:#FFF8E8; border-left:4px solid var(--orange); border-radius:0 10px 10px 0; padding:10px 12px; margin-bottom:8px; font-size:.8rem; line-height:1.6; }
.tip-box strong { display:block; margin-bottom:4px; color:var(--orange-dk); }

/* BUTTONS */
.btn { display:block; width:100%; padding:14px; border:none; border-radius:14px; font-size:1rem; font-weight:800; cursor:pointer; margin-top:10px; text-align:center; transition:transform .1s; }
.btn:active { transform:translateY(2px); }
.btn-green  { background:var(--green);  color:#fff; box-shadow:0 4px 0 var(--green-dk); }
.btn-blue   { background:var(--blue);   color:#fff; box-shadow:0 4px 0 var(--blue-dk); }
.btn-orange { background:var(--orange); color:#fff; box-shadow:0 4px 0 var(--orange-dk); }

.day-reward { display:none; text-align:center; margin-top:10px; font-size:1.4rem; animation:pop .4s ease; }
@keyframes pop { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }

/* MODAL */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:100; align-items:center; justify-content:center; padding:14px; }
.overlay.open { display:flex; }
.modal { background:#fff; border-radius:22px; padding:22px; width:100%; max-width:400px; max-height:92vh; overflow-y:auto; position:relative; }
.modal-close { position:absolute; top:14px; right:14px; background:var(--gray-lt); border:none; width:32px; height:32px; border-radius:50%; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.modal-ttl { font-size:1.25rem; font-weight:900; text-align:center; margin-bottom:4px; }
.modal-sub { text-align:center; font-size:.8rem; color:var(--gray); margin-bottom:16px; }

/* FLASHCARD */
.fc-area { perspective:800px; margin-bottom:14px; }
.fc { width:100%; height:155px; position:relative; cursor:pointer; transform-style:preserve-3d; transition:transform .5s; }
.fc.flipped { transform:rotateY(180deg); }
.fc-front, .fc-back { position:absolute; inset:0; border-radius:16px; display:flex; flex-direction:column; align-items:center; justify-content:center; backface-visibility:hidden; -webkit-backface-visibility:hidden; font-weight:800; padding:18px; text-align:center; }
.fc-front { background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; font-size:1.7rem; }
.fc-front .hint { font-size:.72rem; opacity:.7; margin-top:6px; font-weight:400; }
.fc-back  { background:linear-gradient(135deg,var(--green),var(--teal)); color:#fff; font-size:1.5rem; transform:rotateY(180deg); }
.fc-ctr   { text-align:center; font-size:.8rem; color:var(--gray); margin-bottom:10px; }
.mini-dots { display:flex; gap:4px; justify-content:center; flex-wrap:wrap; margin-bottom:12px; }
.dot { width:11px; height:11px; border-radius:50%; background:var(--gray-lt); border:2px solid var(--gray); }
.dot.ok { background:var(--green); border-color:var(--green); }
.dot.no { background:var(--red);   border-color:var(--red); }
.fc-btns { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
.fc-btn { padding:13px; border:none; border-radius:12px; font-size:.95rem; font-weight:700; cursor:pointer; }
.fc-btn.ok { background:var(--green); color:#fff; box-shadow:0 3px 0 var(--green-dk); }
.fc-btn.no { background:var(--red);   color:#fff; box-shadow:0 3px 0 #CC0000; }
.score-area { display:none; text-align:center; padding:16px 0; }
.score-big  { font-size:2.8rem; font-weight:900; color:var(--green); }
.score-msg  { font-size:.9rem; color:var(--gray); margin-top:4px; }
.score-stars{ font-size:1.8rem; margin:10px 0; }

/* MODE BUTTONS */
.mode-btn { padding:9px 13px; border:2px solid var(--gray); border-radius:10px; background:#fff; font-size:.85rem; font-weight:700; cursor:pointer; flex:1; min-width:0; }
.mode-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }

/* CONFETTI */
.cp { position:fixed; pointer-events:none; z-index:999; animation:fall 1.5s ease-in forwards; }
@keyframes fall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

/* RESUME BUTTON */
.btn-resume { display:block; width:100%; max-width:420px; margin:0 auto 10px; background:var(--yellow); color:#333; border:none; border-radius:18px; padding:17px; font-size:1.08rem; font-weight:900; cursor:pointer; box-shadow:0 5px 0 var(--orange-dk); transition:transform .1s; }
.btn-resume:active { transform:translateY(3px); box-shadow:0 2px 0 var(--orange-dk); }

/* QUIZ PROGRESS PANEL */
.quiz-prog { max-width:420px; margin:0 auto 10px; background:rgba(255,255,255,.16); border-radius:14px; padding:10px 14px; }
.qp-row { display:flex; align-items:center; gap:7px; margin-bottom:5px; color:#fff; font-size:.83rem; font-weight:600; }
.qp-row:last-child { margin-bottom:0; }
.qp-label { min-width:80px; }
.qp-dots { display:flex; gap:4px; flex:1; }
.qp-dot { width:12px; height:12px; border-radius:50%; background:rgba(255,255,255,.25); }
.qp-dot.done { background:var(--yellow); }
.qp-count { font-size:.76rem; opacity:.75; min-width:70px; text-align:right; }
</style>
</head>

const MOTIVS = [
  '💪 Je kunt dit – één stap tegelijk.',
  '🌟 Elke taak die je afvinkt telt!',
  '🎯 Vandaag leren = morgen minder stress.',
  '🔥 Kijk hoe ver je al bent – doe door!',
  '🦁 Sterker dan een onvoldoende. Altijd.',
  '🚀 Bijna bij de toetsweek – je bent er klaar voor!',
  '🏆 De proefwerkweek haalt jou niet in!',

// ── STATE ────────────────────────────────────────────────────────────────────
const SK = 'bo_v4';
function load() {
  try {
    const s=JSON.parse(localStorage.getItem(SK)||'{}');
    return {
      done: s.done||{},
      stars: s.stars||0,
      open: s.open||'di17m',
      quizRounds: s.quizRounds||{fr:0,ak:0,wis:0},
      wordKnown: s.wordKnown||{}
    };
  }
  catch(e){return{done:{},stars:0,open:'di17m',quizRounds:{fr:0,ak:0,wis:0},wordKnown:{}};}
}
function save(){localStorage.setItem(SK,JSON.stringify(st));}
let st = load();

// ── QUIZ ─────────────────────────────────────────────────────────────────────
let qz = {cards:[],idx:0,flipped:false,res:[],mode:'fn',wordSet:WORDS,isAK:false,lastWrong:[]};

function setMode(m){
  qz.mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('m_'+m).classList.add('active');
}

function startQuiz(words, title, isAK){
  if(words) { qz.wordSet=words; qz.isAK=!!isAK; }
  // Update modal title
  document.getElementById('modalTtl').textContent = qz.isAK ? '🌍 AK Begrippen Oefenen' : '🇫🇷 Frans Overhoren';
  document.getElementById('modalSub').textContent = qz.isAK ? 'Begrip → definitie' : 'Kies een modus:';
  document.getElementById('modeBar').style.display = qz.isAK ? 'none' : 'flex';
  document.getElementById('speakBtn').style.display = qz.isAK ? 'none' : '';
  if(qz.isAK) qz.mode='fn';
  // Reset repeat button onclick
  document.getElementById('repeatBtn').onclick = () => startQuiz();
  // Each card gets a random direction for 'both' mode
  const base=shuffle([...qz.wordSet]);
  qz.cards=base.map(w=>{
    let dir=qz.mode;
    if(dir==='both') dir=Math.random()<.5?'fn':'nf';
    if(dir==='listen') dir='fn'; // listen = hear FR, answer NL
    return {...w, dir};
  });
  qz.idx=0; qz.flipped=false; qz.res=[];
  document.getElementById('qArea').style.display='';
  document.getElementById('scoreArea').style.display='none';
  document.getElementById('modal').classList.add('open');
  renderCard();
}

function closeModal(){
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById('modal').classList.remove('open');
}

function renderCard(){
  const c=qz.cards[qz.idx];
  const isListen=(qz.mode==='listen');
  const front = c.dir==='fn' ? c.fr : c.nl;
  const back  = c.dir==='fn' ? c.nl : c.fr;
  const frontLang = c.dir==='fn' ? 'FR' : 'NL';

  document.getElementById('fcF').textContent = isListen ? '🔊 ?' : front;
  document.getElementById('fcB').textContent = back;
  document.getElementById('fcHint').textContent = isListen ? 'Luister → tik om te zien' : qz.isAK ? 'Tik voor de definitie ↓' : 'Tik om te zien ↓';
  document.getElementById('fcCtr').textContent=qz.isAK ? `Kaart ${qz.idx+1} van ${qz.cards.length}` : `Kaart ${qz.idx+1} van ${qz.cards.length} · ${c.dir==='fn'?'🇫🇷→🇳🇱':'🇳🇱→🇫🇷'}`;
  document.getElementById('fc').classList.remove('flipped');
  qz.flipped=false;
  document.getElementById('answerBtns').style.display='none';
  document.getElementById('flipBtn').style.display='';
  // Speak button: always visible; auto-speak in listen mode
  document.getElementById('speakBtn').style.display='';
  if(!qz.isAK && (isListen || qz.mode==='fn')){
    // auto-speak the French word
    setTimeout(()=>speak(c.fr,'fr-FR'),200);
  }
  const d=document.getElementById('dots');
  d.innerHTML=qz.res.map(r=>`<div class="dot ${r?'ok':'no'}"></div>`).join('')
    +Array(Math.min(4,qz.cards.length-qz.res.length-1)).fill('<div class="dot"></div>').join('');
}

function speak(text,lang){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang||'fr-FR'; u.rate=0.85;
  window.speechSynthesis.speak(u);
}

function speakCurrent(){
  const c=qz.cards[qz.idx];
  speak(c.fr,'fr-FR');
}

function flip(){
  if(qz.flipped)return;
  qz.flipped=true;
  document.getElementById('fc').classList.add('flipped');
  // Speak the back (answer) in Dutch after flip if nf mode
  const c=qz.cards[qz.idx];
  if(c.dir==='nf') setTimeout(()=>speak(c.fr,'fr-FR'),400);
  setTimeout(()=>{
    document.getElementById('answerBtns').style.display='grid';
    document.getElementById('flipBtn').style.display='none';
  },280);
}

function ans(ok){
  qz.res.push(ok); qz.idx++;
  if(qz.idx>=qz.cards.length) showScore(); else renderCard();
}
function showScore(){
  const ok=qz.res.filter(Boolean).length, tot=qz.cards.length, pct=Math.round(ok/tot*100);

  // Track wrong words for repeat button
  qz.lastWrong = qz.cards.filter((_,i)=>!qz.res[i]).map(c=>({fr:c.fr,nl:c.nl}));

  // Update quiz rounds counter
  const key = qz.wordSet===WORDS?'fr':qz.wordSet===AK_WORDS?'ak':'wis';
  st.quizRounds[key] = (st.quizRounds[key]||0) + 1;

  // Track which words she knows
  qz.cards.forEach((c,i)=>{
    if(qz.res[i]){
      const k=c.fr.substring(0,28);
      st.wordKnown[k]=(st.wordKnown[k]||0)+1;
    }
  });

  document.getElementById('qArea').style.display='none';
  document.getElementById('scoreArea').style.display='block';
  document.getElementById('scoreNum').textContent=`${ok}/${tot}`;
  document.getElementById('scoreMsg').textContent=pct>=90?'Waanzinnig goed! 🎉':pct>=70?'Super! Nog even oefenen.':'Oefenen helpt – probeer opnieuw!';
  document.getElementById('scoreStars').textContent=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';

  // Show "repeat wrong" button if there are wrong words
  const rw=document.getElementById('repeatWrongBtn');
  if(qz.lastWrong.length>0 && qz.lastWrong.length<tot){
    rw.style.display='';
    rw.textContent=`🔁 Herhaal ${qz.lastWrong.length} fout${qz.lastWrong.length===1?'':'e'} woord${qz.lastWrong.length===1?'':'en'}`;
  } else {
    rw.style.display='none';
  }

  st.stars+=ok; save(); render(); renderQuizProg();
  if(pct>=70) bigConfetti();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const allTasks=DAYS.flatMap(d=>d.blocks.flatMap(b=>b.tasks));
  const doneCnt=allTasks.filter(t=>st.done[t.id]).length;
  const pct=Math.round(doneCnt/allTasks.length*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pLbl').textContent=`${doneCnt} van ${allTasks.length} taken klaar`;
  document.getElementById('totalStars').textContent=st.stars;
  document.getElementById('motiv').textContent=MOTIVS[Math.min(Math.floor(doneCnt/4),MOTIVS.length-1)];

  const track=document.getElementById('track');
  track.innerHTML='';
  DAYS.forEach((day,i)=>{
    const tasks=day.blocks.flatMap(b=>b.tasks);
    const forceDone=day.status==='done';
    const dc=forceDone?tasks.length:tasks.filter(t=>st.done[t.id]).length;
    const allDone=forceDone||(dc===tasks.length&&tasks.length>0);
    const isOpen=st.open===day.id;

    if(i>0){const c=document.createElement('div');c.className='connector';track.appendChild(c);}

    const w=document.createElement('div'); w.className='day-wrapper';

    let cls='day';
    if(day.status==='today') cls+=' today';
    else if(allDone) cls+=' done';
    else if(day.bc==='b-exam') cls+=' exam';

    const badgeTxt=allDone&&tasks.length>0?'✅ Klaar!':(day.badge);
    const badgeCls=allDone&&tasks.length>0?'badge b-done':`badge ${day.bc}`;

    // blocks HTML
    const blocksHtml=day.blocks.map(b=>{
      const stofHtml=b.stof?`<div class="stof-box">${b.stof}</div>`:'';
      const tasksHtml=b.tasks.map(t=>{
        const done=forceDone||st.done[t.id];
        return `<li class="task${done?' done':''}" onclick="toggle('${t.id}',event)">
          <div class="chk">${done?'✓':''}</div>
          <div><div class="task-lbl">${t.e} ${t.l}</div>${t.s?`<div class="task-sub">${t.s}</div>`:''}</div>
        </li>`;
      }).join('');
      const ctaHtml=b.cta?`<button class="btn ${b.cta.action==='quiz'||b.cta.action==='akquiz'||b.cta.action==='wisquiz'?'btn-blue':'btn-green'}" onclick="handleCta('${day.id}','${b.cta.action}',event)">${b.cta.label}</button>`:'';
      return `<div class="subject-block">
        <div class="subject-title"><span class="subject-tag ${b.tagClass}">${b.tag.toUpperCase()}</span>${b.title}</div>
        ${stofHtml}
        <ul class="task-list">${tasksHtml}</ul>
        ${ctaHtml}
      </div>`;
    }).join('');

    w.innerHTML=`<div class="${cls}" onclick="toggleDay('${day.id}')">
      <div class="day-hdr">
        <div class="day-icon" style="background:${day.bg}">${day.icon}</div>
        <div class="day-info">
          <div class="day-name">${day.name}</div>
          <div class="day-date">${day.date}</div>
          <div class="day-sub">${day.sub}</div>
          <div class="day-prog">${dc}/${tasks.length} gedaan</div>
        </div>
        <span class="${badgeCls}">${badgeTxt}</span>
      </div>
      <div class="day-body${isOpen?' open':''}">
        ${blocksHtml}
        <div class="day-reward" id="rw_${day.id}"></div>
      </div>
    </div>`;
    track.appendChild(w);
  });
}

function toggleDay(id){
  st.open=st.open===id?null:id; save(); render();
  if(st.open){setTimeout(()=>{
    const el=document.querySelector(`[onclick="toggleDay('${id}')"]`);
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },60);}
}

function toggle(tid,e){
  e.stopPropagation();
  const was=st.done[tid];
  st.done[tid]=!was;
  if(!was){st.stars++;confetti();}
  else st.stars=Math.max(0,st.stars-1);
  save(); render();
  // check day complete
  const day=DAYS.find(d=>d.blocks.some(b=>b.tasks.some(t=>t.id===tid)));
  if(day){
    const tasks=day.blocks.flatMap(b=>b.tasks);
    if(tasks.every(t=>st.done[t.id])){
      setTimeout(()=>{
        const r=document.getElementById('rw_'+day.id);
        if(r){r.style.display='block';r.textContent='🎉 Dag klaar! +'+tasks.length+' sterren!';bigConfetti();}
      },200);
    }
  }
}

function handleCta(dayId,action,e){
  e.stopPropagation();
  if(action==='quiz') startQuiz(WORDS, null, false);
  if(action==='akquiz') startQuiz(AK_WORDS, null, true);
  if(action==='wisquiz') startQuiz(WIS_WORDS, null, true);
}

// ── NAVIGATE TO NEXT TASK ────────────────────────────────────────────────────
function goToNextTask(){
  const target=DAYS.find(day=>{
    const tasks=day.blocks.flatMap(b=>b.tasks);
    return tasks.length>0 && tasks.some(t=>!st.done[t.id]);
  });
  if(!target){
    document.getElementById('resumeBtn').textContent='🎉 Alles klaar! Geweldig!';
    return;
  }
  st.open=target.id; save(); render();
  setTimeout(()=>{
    const el=document.querySelector(`[onclick="toggleDay('${target.id}')"]`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  },80);
}

// ── REPEAT WRONG WORDS ───────────────────────────────────────────────────────
function repeatWrong(){
  if(qz.lastWrong.length===0) return;
  startQuiz(qz.lastWrong, null, qz.isAK);
}

// ── QUIZ PROGRESS PANEL ──────────────────────────────────────────────────────
function renderQuizProg(){
  const rounds=st.quizRounds||{fr:0,ak:0,wis:0};
  const MAX=5;
  const sets=[
    {key:'fr', icon:'🇫🇷', label:'Frans', total:WORDS.length},
    {key:'wis', icon:'📐', label:'Wiskunde', total:WIS_WORDS.length},
    {key:'ak', icon:'🌍', label:'AK', total:AK_WORDS.length},
  ];
  // Count known words per set
  function knownCount(wordList){
    return wordList.filter(w=>(st.wordKnown[w.fr.substring(0,28)]||0)>=2).length;
  }
  const html=sets.map(s=>{
    const n=Math.min(rounds[s.key]||0,MAX);
    const known=knownCount(s.key==='fr'?WORDS:s.key==='ak'?AK_WORDS:WIS_WORDS);
    const dots=Array(MAX).fill('').map((_,i)=>`<div class="qp-dot${i<n?' done':''}"></div>`).join('');
    const countLbl=n===0?'Nog niet geoefend':`${known}/${s.total} ✅`;
    return `<div class="qp-row"><span style="font-size:1rem">${s.icon}</span><span class="qp-label">${s.label}</span><div class="qp-dots">${dots}</div><span class="qp-count">${countLbl}</span></div>`;
  }).join('');
  document.getElementById('quizProg').innerHTML=html;
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function confetti(){
  const cols=['#FF4B4B','#FF9600','#58CC02','#1CB0F6','#A560E8','#FFC800'];
  for(let i=0;i<8;i++){
    const el=document.createElement('div'); el.className='cp';
    const c=cols[Math.floor(Math.random()*cols.length)];
    const size=6+Math.random()*8;
    el.style.cssText=`left:${Math.random()*100}vw;top:0;background:${c};width:${size}px;height:${size}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*.4}s;`;
    document.getElementById('cc').appendChild(el);
    setTimeout(()=>el.remove(),2000);
  }
}
function bigConfetti(){for(let i=0;i<3;i++)setTimeout(confetti,i*180);}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

render();
renderQuizProg();
</script>
